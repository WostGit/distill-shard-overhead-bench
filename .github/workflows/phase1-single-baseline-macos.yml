name: phase1-single-baseline-macos

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'scripts/**'
      - 'data/**'
      - '.github/workflows/phase1-single-baseline-macos.yml'
      - 'requirements.txt'

jobs:
  single-baseline:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run single baseline
        run: |
          python scripts/run_single_baseline.py \
            --teacher-prompts data/tiny_teacher_prompts.jsonl \
            --eval-path data/tiny_eval.jsonl \
            --output-dir outputs/phase1 \
            --metrics-path outputs/metrics/phase1_single_metrics.json

      - name: Upload phase1 metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase1-single-baseline-metrics
          path: |
            outputs/metrics/phase1_single_metrics.json
            outputs/phase1/*.json
            outputs/phase1/*.jsonl

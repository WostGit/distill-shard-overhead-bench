name: phase1-single-baseline-macos

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  single-baseline:
    runs-on: macos-14
    timeout-minutes: 120
    env:
      PYTHONUNBUFFERED: "1"
      TEACHER_MODEL_ID: Qwen/Qwen2.5-0.5B-Instruct
      STUDENT_MODEL_ID: Qwen/Qwen2.5-0.5B-Instruct
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run phase 1 single baseline
        run: |
          python scripts/run_single_baseline.py \
            --metrics-output outputs/metrics/phase1_single_baseline_metrics.json

      - name: Upload phase1 metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: phase1-single-baseline-metrics
          path: outputs/metrics/phase1_single_baseline_metrics.json
